name: 🚀 Deploy to VDS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout репозитория
      uses: actions/checkout@v3

    - name: 🔐 Настройка SSH-доступа
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VDS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 109.172.30.183 >> ~/.ssh/known_hosts

    - name: 🚀 Деплой на сервер
      run: |
        ssh -i ~/.ssh/id_ed25519 root@109.172.30.183 << 'EOF'
          set -e
          echo "📦 Переход в директорию проекта"
          cd /opt/telegram-bot-container-tracker-2

          echo "🔁 Очистка и обновление Git"
          git reset --hard
          git clean -fd
          git pull origin main

          echo "🐍 Активация/создание виртуального окружения"
          if [ ! -d "venv" ]; then
            python3 -m venv venv --upgrade-deps
          fi
          source venv/bin/activate

          echo "📦 Установка зависимостей с учётом PEP 668"
          pip install --upgrade pip
          pip install --break-system-packages -r requirements.txt

          echo "🔄 Перезапуск Supervisor-сервиса"
          supervisorctl restart telegrambot

          echo "✅ Деплой завершён"
        EOF