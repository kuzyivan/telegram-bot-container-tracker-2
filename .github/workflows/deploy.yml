name: 🚀 Deploy to VDS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VDS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 109.172.30.183 >> ~/.ssh/known_hosts

    - name: Deploy via SSH
      run: |
        ssh -i ~/.ssh/id_ed25519 root@109.172.30.183 << 'EOF'
          set -e
          cd /opt/telegram-bot-container-tracker-2

          echo "⚙️ Очистка локальных изменений..."
          git reset --hard
          git clean -fd

          echo "⬇️ Git pull..."
          git pull origin main

          echo "🐍 Виртуальное окружение..."
          [ ! -d venv ] && python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "♻️ Перезапуск бота..."
          supervisorctl restart telegrambot
        EOF